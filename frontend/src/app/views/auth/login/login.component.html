<main class="auth">
  <div class="auth__logo">
    <h1 class="auth__logo__text">
      Ledger<span class="auth__logo--accent">Ly</span>
    </h1>
  </div>
  <p class="auth__text text_center">
    Inicia sesión en el sistema de gestión de facturas
  </p>

  <form class="form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form__field">
      <label for="email" class="form__label">Email</label>
      <input
        type="email"
        class="form__input"
        placeholder="Tu Email"
        id="email"
        formControlName="email"
      />
      <small class="form__error" *ngIf="email?.touched && email?.invalid">
        <span *ngIf="email?.errors?.['required']">El email es obligatorio</span>
        <span *ngIf="email?.errors?.['email']">Formato de email inválido</span>
      </small>
    </div>

    <div class="form__field">
      <label for="password" class="form__label">Password</label>
      <div class="password-field">
        <input
          [type]="showPassword ? 'text' : 'password'"
          class="form__input password-field__input"
          placeholder="Tu Password"
          id="password"
          formControlName="password"
        />
        <button
          type="button"
          class="password-field__toggle"
          [class.password-field__toggle--visible]="showPassword"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
          [attr.title]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
        >
          <svg
            *ngIf="!showPassword"
            class="password-field__icon"
            viewBox="0 0 24 24"
            role="img"
            aria-hidden="true"
          >
            <path d="M12 5c5 0 8.5 4.2 9.7 6a1.8 1.8 0 0 1 0 2C20.5 14.8 17 19 12 19s-8.5-4.2-9.7-6a1.8 1.8 0 0 1 0-2C3.5 9.2 7 5 12 5Zm0 2c-3.7 0-6.5 3-7.8 5 1.3 2 4.1 5 7.8 5s6.5-3 7.8-5C18.5 10 15.7 7 12 7Zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z" />
          </svg>
          <svg
            *ngIf="showPassword"
            class="password-field__icon"
            viewBox="0 0 24 24"
            role="img"
            aria-hidden="true"
          >
            <path d="m4.1 2.7 17.2 17.2-1.4 1.4-3.3-3.3A10.2 10.2 0 0 1 12 19c-5 0-8.5-4.2-9.7-6a1.8 1.8 0 0 1 0-2 17 17 0 0 1 3-3.4L2.7 4.1l1.4-1.4Zm2.6 6.4A14.4 14.4 0 0 0 4.2 12c1.3 2 4.1 5 7.8 5 1.1 0 2.1-.3 3-.7l-2.1-2.1A3 3 0 0 1 9.8 11L6.7 9.1ZM12 5c5 0 8.5 4.2 9.7 6a1.8 1.8 0 0 1 0 2 15 15 0 0 1-2.2 2.7l-3.1-3.1A4.2 4.2 0 0 0 16 12a4 4 0 0 0-4-4c-.2 0-.4 0-.6.1L8.9 5.6c1-.4 2-.6 3.1-.6Z" />
          </svg>
        </button>
      </div>
      <small class="form__error" *ngIf="password?.touched && password?.invalid">
        <span *ngIf="password?.errors?.['required']"
          >La contraseña es obligatoria</span
        >
      </small>
    </div>

    <div class="form__remember">
      <input type="checkbox" id="remember" formControlName="remember" />
      <label for="remember">Recordarme</label>
    </div>
    <input type="submit" class="form__submit" value="Iniciar Sesión" />
  </form>
  <div class="actions">
    <a routerLink="/auth/register" class="actions__link"
      >¿Aun no tienes cuenta? Da de alta tu empresa</a
    >
    <a routerLink="/auth/forget" class="actions__link"
      >¿Olvidaste tu contraseña?</a
    >
  </div>
</main>
